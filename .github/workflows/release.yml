name: release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  prepare:
    name: prepare release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.prepare.outputs.should_release }}
      release_tag: ${{ steps.prepare.outputs.release_tag }}
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.1
        with:
          fetch-depth: 2

      - name: decide release tag
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          version="$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["package"]["version"])')"
          tag="v${version}"
          should_release=false

          if [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"
            should_release=true
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            should_release=true
            if ! git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag "${tag}"
              git push origin "${tag}"
            fi
          else
            old_version=""
            if git rev-parse HEAD^ >/dev/null 2>&1 && git show HEAD^:Cargo.toml >/tmp/old-Cargo.toml 2>/dev/null; then
              old_version="$(python3 -c 'import tomllib; print(tomllib.load(open("/tmp/old-Cargo.toml", "rb"))["package"]["version"])')"
            fi

            if [ "${old_version}" != "${version}" ]; then
              if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
                echo "tag ${tag} already exists; skipping automatic release"
              else
                git config user.name "github-actions[bot]"
                git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                git tag "${tag}"
                git push origin "${tag}"
                should_release=true
              fi
            fi
          fi

          echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"

  release-gates:
    name: release gates
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.1
        with:
          ref: ${{ needs.prepare.outputs.release_tag }}

      - name: install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.2
        with:
          components: rustfmt, clippy

      - name: format
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --all --benches --tests --examples --all-features -- -D warnings

      - name: test all features
        run: cargo test --all-features

      - name: test no default features
        run: cargo test --no-default-features

      - name: build release binary
        run: cargo build --release --locked --all-features

      - name: release smoke
        run: python3 scripts/release_smoke.py --bin target/release/prism

      - name: performance smoke
        run: python3 scripts/perf_matrix.py --build --iterations 5 --warmups 1 --output target/perf-release-smoke.md

      - name: upload performance smoke report
        uses: actions/upload-artifact@v6
        with:
          name: prism-perf-release-smoke
          path: target/perf-release-smoke.md

  build:
    name: build ${{ matrix.target }} on ${{ matrix.os }}
    needs:
      - prepare
      - release-gates
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: prism
            artifact_suffix: linux-amd64-musl
            build_tool: zigbuild
            smoke_test: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: prism
            artifact_suffix: linux-aarch64-musl
            build_tool: zigbuild
            smoke_test: false
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: prism
            artifact_suffix: darwin-aarch64
            build_tool: cargo
            smoke_test: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: prism.exe
            artifact_suffix: windows-amd64
            build_tool: cargo
            smoke_test: true

    steps:
      - name: checkout
        uses: actions/checkout@v6.0.1
        with:
          ref: ${{ needs.prepare.outputs.release_tag }}

      - name: install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.2
        with:
          target: ${{ matrix.target }}

      - name: install zig
        if: matrix.build_tool == 'zigbuild'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: install cargo-zigbuild
        if: matrix.build_tool == 'zigbuild'
        uses: taiki-e/install-action@cargo-zigbuild

      - name: build
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.build_tool }}" = "zigbuild" ]; then
            RUSTFLAGS="${RUSTFLAGS:-} -A linker-messages" \
              cargo zigbuild --release --locked --all-features --target ${{ matrix.target }}
          else
            cargo build --release --locked --all-features --target ${{ matrix.target }}
          fi

      - name: smoke test
        if: matrix.smoke_test
        shell: bash
        run: python scripts/release_smoke.py --bin target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          cd target/${{ matrix.target }}/release
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ../../../prism-${{ matrix.artifact_suffix }}.zip ${{ matrix.artifact_name }}
          else
            tar czf ../../../prism-${{ matrix.artifact_suffix }}.tar.gz ${{ matrix.artifact_name }}
          fi

      - name: upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: prism-${{ matrix.artifact_suffix }}
          path: prism-${{ matrix.artifact_suffix }}.*

  publish:
    name: publish release
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: download artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: prepare release files
        run: |
          set -euo pipefail
          mkdir release-files
          find artifacts -type f -name 'prism-*' -exec mv {} release-files/ \;
          (
            cd release-files
            sha256sum prism-* > SHA256SUMS
          )

      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          make_latest: true
          generate_release_notes: true
